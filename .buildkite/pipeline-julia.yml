steps:
  - label: "Metal: Julia {{matrix.version}}"
    matrix:
      setup:
        version:
          - "1.10"
    plugins:
      - JuliaCI/julia#v1:
          version: "{{matrix.version}}"
      - JuliaCI/julia-coverage#v1:
          codecov: true
    command: |
      julia -e 'using Pkg

                println("--- :julia: Instantiating environment")
                Pkg.add("Metal")
                Pkg.develop(path=".")

                println("+++ :julia: Running tests")
                Pkg.test("DistanceTransforms"; coverage=true, test_args=["Metal"])'
    agents:
      queue: "juliaecosystem"
      os: "macos"
      arch: "aarch64"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 10

  - label: "Metal: Run Benchmarks"
    key: "metal-benchmarks"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.10"
    command: |
      julia --project=benchmarks -e '
          using Pkg;
          Pkg.instantiate();
          Pkg.develop(path=pwd());
          Pkg.add("Metal");
      '
      julia --project=benchmarks benchmarks/runbenchmarks.jl
    artifacts:
      - "benchmarks/results/Metalbenchmarks.json"
    agents:
      queue: "juliaecosystem"
      os: "macos"
      arch: "aarch64"
    env:
      BENCHMARK_GROUP: Metal
      if: build.message !~ /\[skip benchmarks\]/
      timeout_in_minutes: 12
